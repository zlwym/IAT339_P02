<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Star Shop</title>
    <link href = "main.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>

<body>
    <header>

        <div class="website-nav">

            <h1><a href="index.html">Nova</a></h1>

            <div class = "menu">
            <h4><a href="stars.html">Stars</a></h4>
            <h4><a href ="nebulae.html">Nebulae</a></h4>
            <h4><a href ="galaxies.html">Galaxies</a></h4>
            <h4><a href ="sale.html">Sale</a></h4>
            </div>

            <div class = "cart-icon">
                <a href="cart.html"><img src="icons/cart-icon.png" alt="Cart Icon" width="24" height="24"></a>
            </div>

        </div>
    </header>

    <section>

        <div class="checkout-container">


        <div class="cart-contents">                
            <h4 class="listing-header">Your Cart</h4>
            <div>
                <div class="border"></div> 

                <div class="cart-item">
                    <img src="img/Andromeda.png" alt="Andromeda" width="80" height="100">
                    <h2>Andromeda Galaxy</h2>
                    <h3>NGC 224 | Galaxy</h3>
                    <h2>$500,000,000</h2>
                </div>
                <div class="border"></div>

                <div class="cart-item">
                    <img src="img/blue_snowball.png" alt="Blue Snowball" width="80" height="100">
                    <h2>Blue Snowball</h2>
                    <h3>NGC 7662 | Nebula</h3>
                    <h2>$80,000,000</h2>
                </div>
                <div class="border"></div> 
            </div>
        </div> 
        

        <div class="checkout">
            <div class="cart-overview">                
                <h4 class="listing-header">Summary</h4>
                <div>
                    <div class="border"></div> 
                    <div class="cart-detail">
                    <h3>TAX</h3>
                    <h3>$0</h3>
                    </div>

                    <div class="border"></div> 
                    <div class="cart-detail">
                    <h3>TAX</h3>
                    <h3>$0</h3>
                    </div>

                    <div class="border"></div> 
                    <div class="cart-detail">
                    <h3>TAX</h3>
                    <h3>$0</h3>
                    </div>

                    <div class="border"></div> 
                    <div class="cart-detail">
                    <h2>TOTAL</h2>
                    <h2>$1,000,000,000</h2>
                    </div>

                </div>
            </div>


            <div class="card-information">
                <h4 class="listing-header">Checkout</h4>
                
                <div class="radio-button">
              <div>
                <input class="radio-input" type="radio" id="Mastercard" name="Payments" value="Mastercard">
                <label class="radio-label" for="Mastercard">Mastercard</label> 
              </div>
              <div>
                <input class="radio-input" type="radio" id="Visa" name="Payments" value="Visa">
                <label class="radio-label" for="Visa">Visa</label>
              </div>
              <div>
                <input class="radio-input" type="radio" id="Paypal" name="Payments" value="Paypal">
                <label class="radio-label" for="Paypal">Paypal</label>
              </div>
            </div>

                <div class="border"></div>

                <div class="card-detail">
                    <label for="cardholder-name"><h3>Cardholder Name</h3></label><br>
                    <input type="name">
                </div>

                <div class="border"></div>
                
                <div class="card-detail">
                    <label for="card-number"><h3>Card Number</h3></label><br>
                    <input type="card-number" placeholder="1234 5678 9012 3456">
                </div>

                <div class="border"></div>

                <div class="card-detail">
                    <label for="expiration-date"><h3>Expiration Date</h3></label><br>
                    <input type="text" placeholder="MM/YY">
                </div>

                <div class="border"></div>
                
                <div class="card-detail">
                    <label for="cvv"><h3>CVV</h3></label><br>
                    <input type="text" placeholder="123">
                </div>

                <div class="border"></div>

                <a class="cart-button" href="#">Place Order</a>
            </div>
        </div>

        
        </div>       

        <div class="border"></div>
       
    </section>


    <footer class="footer">
        <h6>© All Rights Reserved | <a href="citations.html">Citations</a> | <a href="styleguide.html">Style Guide</a> | <a href="https://github.com/zlwym/IAT339_P02.git">Repository</a> </h6>
    </footer>
 
</body>
</html>
